session_name: alt-nudge-swarm
start_directory: ./
windows:
  - window_name: swarm-grid
    layout: tiled # Typically results in a tiled layout; exact 3x2 depends on pane count and terminal size
    panes:
      # Row 1: Execution DAG Roles (Logic)
      - shell_command: "bash"
        name: planner
      - shell_command: "bash"
        name: implementer
      - shell_command: "bash"
        name: reviewer

      # Row 2: Infrastructure & Context (Monitoring)
      - shell_command: "./alt/scripts/trigger_loop.sh"
        name: trigger-loop
      - shell_command: "backlog browser --no-open -p 6424"
        name: task-board
      - shell_command: "tail -f /tmp/bifrost.log"
        name: gateway-logs
