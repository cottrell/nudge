session_name: agent_grid
start_directory: ./
windows:
  - window_name: grid
    layout: tiled
    panes:
      - shell_command: codex
        nudge:
          title: codex
          agent: codex
          monitor: true
          babysit:
            enabled: false

      - shell_command: claude
        nudge:
          title: claude
          agent: claude
          monitor: true
          babysit:
            enabled: true
            interval_secs: 600
            long_prompt_file: "../prompts/claude_main.md"
            short_prompt: "Please continue. Stay in role and keep moving."

      - shell_command: "agy --dangerously-skip-permissions"
        nudge:
          title: antigravity
          agent: antigravity
          monitor: true
          babysit:
            enabled: false

      - shell_command: copilot
        nudge:
          title: copilot
          agent: copilot
          monitor: true
          babysit:
            enabled: false

      - shell_command: qwen
        nudge:
          title: qwen
          agent: qwen
          monitor: true
          babysit:
            enabled: false

      - shell_command: vibe
        nudge:
          title: vibe
          agent: vibe
          monitor: true
          babysit:
            enabled: false
