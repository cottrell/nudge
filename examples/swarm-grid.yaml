session:
  name: agent_grid
  window: grid

layout:
  type: grid
  rows: 2
  cols: 3

panes:
  - pane: "0.0"
    title: codex
    agent: codex
    command: "codex"
    monitor: true
    babysit:
      enabled: false

  - pane: "0.1"
    title: claude
    agent: claude
    command: "claude"
    monitor: true
    babysit:
      enabled: true
      interval_secs: 600
      long_prompt_file: "../prompts/claude_main.md"
      short_prompt: "Please continue. Stay in role and keep moving."

  - pane: "0.2"
    title: copilot
    agent: copilot
    command: "copilot"
    monitor: true
    babysit:
      enabled: false

  - pane: "0.3"
    title: gemini
    agent: gemini
    command: "gemini"
    monitor: true
    babysit:
      enabled: false

  - pane: "0.4"
    title: qwen
    agent: qwen
    command: "qwen"
    monitor: true
    babysit:
      enabled: false

  - pane: "0.5"
    title: vibe
    agent: vibe
    command: "mistral"
    monitor: true
    babysit:
      enabled: false
